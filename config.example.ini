```ini
[General]
; Application settings for the PC FPS Uncapper
enabled = true                   ; Enable or disable the FPS uncapper
fps_limit = 144                  ; Set target FPS limit (0 for unlimited)
fps_mode = adaptive               ; Options: 'adaptive', 'fixed'
monitor_index = 0                ; Index of the monitor to apply settings (0 for primary)

[Hotkeys]
; Hotkey settings for quick access
toggle_fps = F12                 ; Hotkey to toggle FPS uncapper on/off
increase_fps = F11               ; Hotkey to increase FPS limit
decrease_fps = F10               ; Hotkey to decrease FPS limit
screenshot = F9                  ; Hotkey to take a screenshot

[Features]
; Features that can be enabled or disabled 
background_fps_limiting = true   ; Allows FPS limiting even when the app is in the background
auto_start = true                 ; Automatically start the FPS uncapper with Windows
fps_display = true                ; Display current FPS on screen
performance_monitor = false       ; Enable performance monitoring overlay

[Display]
; Display options for FPS uncapper visuals
overlay_position = top-right      ; Options: 'top-left', 'top-right', 'bottom-left', 'bottom-right'
font_size = 14                    ; Font size of the FPS display
font_color = #FFFFFF               ; Color of the FPS text in hex (white)
background_color = #000000        ; Background color behind the FPS text in hex (black)
```